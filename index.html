<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ใบเสนอราคา — อู่ทำสีรถยนต์</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f2b5b;
    --navy-mid: #1a3f7f;
    --navy-light: #2c5fa8;
    --navy-pale: #e8f0fb;
    --labor-color: #1a56db;
    --labor-bg: #eff6ff;
    --parts-color: #047857;
    --parts-bg: #ecfdf5;
    --accent: #f59e0b;
    --bg: #f4f7fc;
    --white: #ffffff;
    --border: #d1dae8;
    --text: #1e2a3a;
    --text-muted: #64748b;
    --danger: #dc2626;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(15,43,91,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans Thai', 'Sarabun', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    background: var(--navy);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .topbar-title {
    color: white;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }
  .topbar-title span { color: var(--accent); }
  .btn-print {
    background: var(--accent);
    color: #1a1a1a;
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.15s, background 0.15s;
  }
  .btn-print:active { transform: scale(0.96); }
  .btn-print svg { width: 18px; height: 18px; }

  /* ===== MAIN LAYOUT ===== */
  .main {
    max-width: 820px;
    margin: 0 auto;
    padding: 20px 16px 60px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-header {
    background: var(--navy);
    padding: 12px 20px;
    color: white;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-header svg { opacity: 0.75; }
  .card-body { padding: 20px; }

  /* ===== SHOP SETTINGS ===== */
  .shop-logo-area {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .logo-upload-box {
    width: 100px;
    height: 100px;
    border: 2px dashed var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--navy-pale);
    transition: border-color 0.2s;
  }
  .logo-upload-box:hover { border-color: var(--navy-light); }
  .logo-upload-box input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .logo-upload-box img { width: 100%; height: 100%; object-fit: contain; }
  .logo-placeholder { display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none; }
  .logo-placeholder svg { width: 32px; height: 32px; color: var(--navy-mid); }
  .logo-placeholder span { font-size: 11px; color: var(--text-muted); text-align: center; line-height: 1.3; }
  .shop-fields { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 10px; }

  /* ===== FORM ELEMENTS ===== */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  input[type=text], input[type=tel], textarea, select {
    font-family: inherit;
    font-size: 14px;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    background: white;
    transition: border-color 0.2s;
    width: 100%;
  }
  input[type=text]:focus, input[type=tel]:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--navy-light);
    box-shadow: 0 0 0 3px rgba(44,95,168,0.12);
  }
  textarea { resize: vertical; min-height: 72px; }

  /* ===== ITEMS TABLE ===== */
  .items-table-wrap { overflow-x: auto; }
  table.items-table { width: 100%; border-collapse: collapse; min-width: 520px; }
  .items-table thead th {
    background: var(--navy);
    color: white;
    padding: 10px 12px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-align: left;
  }
  .items-table thead th:last-child { text-align: center; width: 48px; }
  .items-table thead th.th-price { text-align: right; }
  .items-table tbody tr { border-bottom: 1px solid var(--border); }
  .items-table tbody tr:last-child { border-bottom: none; }
  .items-table td { padding: 8px 10px; vertical-align: middle; }
  .items-table input[type=text] { padding: 8px 10px; font-size: 14px; }
  .items-table input.price-input {
    text-align: right;
    padding: 8px 10px;
    font-size: 14px;
    width: 100%;
  }
  .items-table select { padding: 8px 10px; font-size: 13px; }

  .badge-labor {
    background: var(--labor-bg);
    color: var(--labor-color);
    font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 20px;
    white-space: nowrap;
  }
  .badge-parts {
    background: var(--parts-bg);
    color: var(--parts-color);
    font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 20px;
    white-space: nowrap;
  }

  .btn-del {
    background: #fee2e2; color: var(--danger);
    border: none; border-radius: 6px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; margin: auto; flex-shrink: 0;
  }
  .btn-del:active { background: #fca5a5; }

  .btn-add-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--navy-pale); color: var(--navy);
    border: 1.5px dashed var(--navy-light);
    border-radius: 8px; padding: 10px 18px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; width: 100%; justify-content: center;
    margin-top: 12px; transition: background 0.15s;
  }
  .btn-add-row:hover { background: #d5e3f7; }

  /* ===== TOTALS ===== */
  .totals-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
  }
  @media (max-width: 500px) { .totals-grid { grid-template-columns: 1fr; } }
  .total-box {
    border-radius: 10px; padding: 16px 18px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .total-box.labor { background: var(--labor-bg); }
  .total-box.parts { background: var(--parts-bg); }
  .total-box.grand { background: var(--navy); }
  .total-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .total-box.labor .total-label { color: var(--labor-color); }
  .total-box.parts .total-label { color: var(--parts-color); }
  .total-box.grand .total-label { color: rgba(255,255,255,0.65); }
  .total-amount { font-size: 22px; font-weight: 700; }
  .total-box.labor .total-amount { color: var(--labor-color); }
  .total-box.parts .total-amount { color: var(--parts-color); }
  .total-box.grand .total-amount { color: white; }

  /* ===== DIVIDER ===== */
  .section-divider { height: 1px; background: var(--border); margin: 4px 0; }

  /* ===== NOTE FIELD ===== */
  .note-row { display: flex; flex-direction: column; gap: 5px; }

  /* ===== PDF PREVIEW (hidden, used for capture) ===== */
  #pdf-doc {
    position: fixed; left: -9999px; top: 0;
    width: 794px;
    background: white;
    font-family: 'IBM Plex Sans Thai', 'Sarabun', sans-serif;
    color: #1e2a3a;
    padding: 0;
  }

  .pdf-page {
    width: 794px;
    min-height: 1123px;
    padding: 40px 48px;
    display: flex;
    flex-direction: column;
  }

  /* PDF Header */
  .pdf-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 3px solid #0f2b5b;
  }
  .pdf-shop-info { display: flex; gap: 16px; align-items: flex-start; }
  .pdf-logo { width: 70px; height: 70px; object-fit: contain; flex-shrink: 0; }
  .pdf-logo-text {
    width: 70px; height: 70px; background: #0f2b5b;
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    color: white; font-size: 11px; font-weight: 700; text-align: center; padding: 6px;
  }
  .pdf-shop-name { font-size: 17px; font-weight: 700; color: #0f2b5b; margin-bottom: 4px; }
  .pdf-shop-addr { font-size: 11px; color: #475569; line-height: 1.6; }
  .pdf-doc-meta { text-align: right; }
  .pdf-doc-title {
    font-size: 22px; font-weight: 800;
    color: #0f2b5b; letter-spacing: -0.01em; margin-bottom: 6px;
  }
  .pdf-doc-sub { font-size: 11px; color: #64748b; line-height: 1.7; }
  .pdf-doc-no { font-size: 13px; font-weight: 700; color: #1a3f7f; }

  /* PDF Customer + Car */
  .pdf-info-row {
    display: flex; gap: 16px; margin-bottom: 20px;
  }
  .pdf-info-box {
    flex: 1; border: 1.5px solid #d1dae8;
    border-radius: 8px; overflow: hidden;
  }
  .pdf-info-box-title {
    background: #0f2b5b; color: white;
    font-size: 11px; font-weight: 700;
    padding: 7px 14px; letter-spacing: 0.04em;
  }
  .pdf-info-grid {
    padding: 10px 14px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 3px 12px;
  }
  .pdf-info-item { font-size: 11px; display: flex; gap: 4px; }
  .pdf-info-key { color: #64748b; min-width: 60px; flex-shrink: 0; }
  .pdf-info-val { font-weight: 600; color: #1e2a3a; }

  /* PDF Table */
  .pdf-items-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 12px; }
  .pdf-items-table thead tr { background: #0f2b5b; }
  .pdf-items-table thead th {
    color: white; padding: 9px 12px;
    text-align: left; font-weight: 700; font-size: 11px; letter-spacing: 0.03em;
  }
  .pdf-items-table thead th.r { text-align: right; }
  .pdf-items-table thead th.c { text-align: center; }
  .pdf-items-table tbody td { padding: 8px 12px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
  .pdf-items-table tbody tr:nth-child(even) td { background: #f8fafc; }
  .pdf-items-table td.r { text-align: right; font-weight: 600; }
  .pdf-items-table td.c { text-align: center; }

  .pdf-badge-labor { background: #eff6ff; color: #1a56db; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .pdf-badge-parts { background: #ecfdf5; color: #047857; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }

  /* PDF Totals */
  .pdf-totals-section { display: flex; justify-content: flex-end; margin-bottom: 20px; }
  .pdf-totals-box { width: 280px; }
  .pdf-total-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 14px; font-size: 12px;
  }
  .pdf-total-row.labor { background: #eff6ff; border-radius: 6px; margin-bottom: 4px; color: #1a56db; font-weight: 600; }
  .pdf-total-row.parts { background: #ecfdf5; border-radius: 6px; margin-bottom: 8px; color: #047857; font-weight: 600; }
  .pdf-total-row.grand {
    background: #0f2b5b; border-radius: 8px;
    color: white; font-size: 15px; font-weight: 800; padding: 12px 16px;
  }

  /* PDF Warranty */
  .pdf-warranty {
    background: #fffbeb; border: 1.5px solid #fde68a;
    border-radius: 8px; padding: 10px 14px; margin-bottom: 20px;
    font-size: 11px; color: #78350f; line-height: 1.6;
  }
  .pdf-warranty strong { font-weight: 700; display: block; margin-bottom: 3px; color: #92400e; }

  /* PDF Signatures */
  .pdf-sigs { display: flex; gap: 16px; }
  .pdf-sig-box {
    flex: 1; border: 1.5px solid #d1dae8;
    border-radius: 8px; padding: 14px 16px;
    text-align: center;
  }
  .pdf-sig-line {
    border-bottom: 1.5px solid #94a3b8;
    margin: 32px 16px 8px;
  }
  .pdf-sig-label { font-size: 11px; color: #475569; }
  .pdf-sig-date { font-size: 10px; color: #94a3b8; margin-top: 4px; }

  /* PDF Note */
  .pdf-note { background: #f8fafc; border-left: 3px solid #2c5fa8; border-radius: 0 6px 6px 0; padding: 10px 14px; margin-bottom: 16px; font-size: 11px; color: #475569; }
  .pdf-note strong { color: #0f2b5b; font-weight: 700; }

  .pdf-footer {
    margin-top: auto; padding-top: 16px;
    border-top: 1px solid #e2e8f0;
    font-size: 10px; color: #94a3b8; text-align: center;
  }

  /* Save button area */
  .actions-bar {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .btn-secondary {
    display: flex; align-items: center; gap: 8px;
    background: var(--navy-pale); color: var(--navy);
    border: 1.5px solid var(--border);
    border-radius: 8px; padding: 10px 18px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-secondary:hover { background: #d5e3f7; }
  .save-msg { font-size: 13px; color: var(--parts-color); font-weight: 600; align-self: center; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-title">🔧 อู่ <span>ทำสีรถยนต์</span> — ใบเสนอราคา</div>
  <button class="btn-print" onclick="generatePDF()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8" rx="1"/></svg>
    พิมพ์ / PDF
  </button>
</div>

<div class="main">

  <!-- SHOP SETTINGS -->
  <div class="card">
    <div class="card-header">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      ตั้งค่าข้อมูลร้าน (Shop Settings)
    </div>
    <div class="card-body">
      <div class="shop-logo-area">
        <div class="logo-upload-box" id="logoBox">
          <input type="file" accept="image/*" id="logoInput" onchange="handleLogoUpload(event)">
          <div class="logo-placeholder" id="logoPlaceholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>แตะเพื่อ<br>อัปโหลดโลโก้</span>
          </div>
          <img id="logoPreview" style="display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;" alt="โลโก้ร้าน">
        </div>
        <div class="shop-fields">
          <div class="form-group">
            <label>ชื่อร้าน / อู่</label>
            <input type="text" id="shopName" placeholder="เช่น อู่ดีเซลสีสวย" oninput="saveShopData()">
          </div>
          <div class="form-group">
            <label>ที่อยู่ร้าน</label>
            <textarea id="shopAddress" placeholder="บ้านเลขที่, ถนน, แขวง, เขต, จังหวัด" rows="2" oninput="saveShopData()"></textarea>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label>เบอร์โทรร้าน</label>
              <input type="tel" id="shopPhone" placeholder="0xx-xxx-xxxx" oninput="saveShopData()">
            </div>
            <div class="form-group">
              <label>Line ID ร้าน</label>
              <input type="text" id="shopLine" placeholder="@shopline" oninput="saveShopData()">
            </div>
          </div>
        </div>
      </div>
      <div style="margin-top:12px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <button class="btn-secondary" onclick="clearLogo()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          ลบโลโก้
        </button>
        <span class="save-msg" id="saveMsg" style="display:none">✓ บันทึกแล้ว</span>
      </div>
    </div>
  </div>

  <!-- CUSTOMER INFO -->
  <div class="card">
    <div class="card-header">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      ข้อมูลลูกค้า
    </div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group full">
          <label>ชื่อลูกค้า</label>
          <input type="text" id="custName" placeholder="ชื่อ-นามสกุล">
        </div>
        <div class="form-group">
          <label>เบอร์โทรศัพท์</label>
          <input type="tel" id="custPhone" placeholder="0xx-xxx-xxxx">
        </div>
        <div class="form-group">
          <label>Line ID</label>
          <input type="text" id="custLine" placeholder="@lineid">
        </div>
      </div>
    </div>
  </div>

  <!-- CAR INFO -->
  <div class="card">
    <div class="card-header">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v9a2 2 0 01-2 2h-2"/><circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
      ข้อมูลรถยนต์
    </div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group">
          <label>ยี่ห้อ / รุ่น</label>
          <input type="text" id="carModel" placeholder="เช่น Toyota Camry 2023">
        </div>
        <div class="form-group">
          <label>ทะเบียนรถ</label>
          <input type="text" id="carPlate" placeholder="กก 1234 กรุงเทพฯ">
        </div>
        <div class="form-group">
          <label>สีเดิมของรถ</label>
          <input type="text" id="carColor" placeholder="เช่น ขาวมุก, ดำเมทัลลิก">
        </div>
        <div class="form-group">
          <label>วันที่ออกใบเสนอราคา</label>
          <input type="text" id="quoteDate" placeholder="วว/ดด/ปปปป">
        </div>
      </div>
    </div>
  </div>

  <!-- ITEMS TABLE -->
  <div class="card">
    <div class="card-header">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      รายการซ่อม / ทำสี
    </div>
    <div class="card-body">
      <div class="items-table-wrap">
        <table class="items-table" id="itemsTable">
          <thead>
            <tr>
              <th style="width:36px;">#</th>
              <th>รายการ</th>
              <th style="width:130px;">ประเภท</th>
              <th class="th-price" style="width:130px;">ราคา (บาท)</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="itemsBody"></tbody>
        </table>
      </div>
      <button class="btn-add-row" onclick="addRow()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        เพิ่มแถวรายการ
      </button>
    </div>
  </div>

  <!-- TOTALS -->
  <div class="card">
    <div class="card-header">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      สรุปยอดเงิน
    </div>
    <div class="card-body">
      <div class="totals-grid">
        <div class="total-box labor">
          <div class="total-label">ยอดรวมค่าแรงทำสี</div>
          <div class="total-amount" id="totalLabor">฿0</div>
        </div>
        <div class="total-box parts">
          <div class="total-label">ยอดรวมค่าอะไหล่</div>
          <div class="total-amount" id="totalParts">฿0</div>
        </div>
        <div class="total-box grand">
          <div class="total-label">ยอดรวมสุทธิ</div>
          <div class="total-amount" id="totalGrand">฿0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- NOTE -->
  <div class="card">
    <div class="card-header">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      หมายเหตุเพิ่มเติม
    </div>
    <div class="card-body">
      <div class="note-row">
        <label>หมายเหตุ / เงื่อนไขพิเศษ</label>
        <textarea id="quoteNote" placeholder="ระบุหมายเหตุเพิ่มเติม เช่น ระยะเวลาซ่อม, เงื่อนไขการชำระเงิน..." rows="3"></textarea>
      </div>
    </div>
  </div>

</div><!-- end .main -->

<!-- ===== HIDDEN PDF DOCUMENT ===== -->
<div id="pdf-doc">
  <div class="pdf-page" id="pdfPage"></div>
</div>

<script>
/* ===== GLOBALS ===== */
let logoDataURL = null;
let rowCount = 0;

/* ===== DATE DEFAULT ===== */
(function(){
  const d = new Date();
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear() + 543;
  document.getElementById('quoteDate').value = `${dd}/${mm}/${yyyy}`;
})();

/* ===== SHOP DATA PERSISTENCE ===== */
function saveShopData() {
  const data = {
    shopName: document.getElementById('shopName').value,
    shopAddress: document.getElementById('shopAddress').value,
    shopPhone: document.getElementById('shopPhone').value,
    shopLine: document.getElementById('shopLine').value,
    logoDataURL: logoDataURL
  };
  try { localStorage.setItem('shopSettings', JSON.stringify(data)); } catch(e) {}
  const msg = document.getElementById('saveMsg');
  msg.style.display = 'inline';
  clearTimeout(msg._t);
  msg._t = setTimeout(() => msg.style.display = 'none', 2000);
}

function loadShopData() {
  try {
    const raw = localStorage.getItem('shopSettings');
    if (!raw) return;
    const data = JSON.parse(raw);
    document.getElementById('shopName').value = data.shopName || '';
    document.getElementById('shopAddress').value = data.shopAddress || '';
    document.getElementById('shopPhone').value = data.shopPhone || '';
    document.getElementById('shopLine').value = data.shopLine || '';
    if (data.logoDataURL) {
      logoDataURL = data.logoDataURL;
      showLogoPreview(logoDataURL);
    }
  } catch(e) {}
}

function handleLogoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    logoDataURL = ev.target.result;
    showLogoPreview(logoDataURL);
    saveShopData();
  };
  reader.readAsDataURL(file);
}

function showLogoPreview(src) {
  const img = document.getElementById('logoPreview');
  const ph = document.getElementById('logoPlaceholder');
  img.src = src;
  img.style.display = 'block';
  ph.style.display = 'none';
}

function clearLogo() {
  logoDataURL = null;
  const img = document.getElementById('logoPreview');
  const ph = document.getElementById('logoPlaceholder');
  img.style.display = 'none';
  img.src = '';
  ph.style.display = 'flex';
  document.getElementById('logoInput').value = '';
  saveShopData();
}

/* ===== ROWS ===== */
function addRow(desc='', type='labor', price='') {
  rowCount++;
  const tbody = document.getElementById('itemsBody');
  const tr = document.createElement('tr');
  tr.id = `row-${rowCount}`;
  tr.innerHTML = `
    <td style="color:var(--text-muted);font-size:13px;text-align:center;">${tbody.children.length + 1}</td>
    <td><input type="text" value="${desc}" placeholder="รายละเอียดงาน..." style="width:100%;border:1.5px solid var(--border);border-radius:7px;" oninput=""></td>
    <td>
      <select onchange="updateTotals(); updateTypeBadge(this)" style="width:100%;border:1.5px solid var(--border);border-radius:7px;">
        <option value="labor" ${type==='labor'?'selected':''}>ค่าแรงทำสี</option>
        <option value="parts" ${type==='parts'?'selected':''}>ค่าอะไหล่</option>
      </select>
    </td>
    <td><input type="text" class="price-input" value="${price}" placeholder="0.00" style="width:100%;border:1.5px solid var(--border);border-radius:7px;text-align:right;" oninput="updateTotals()" onkeypress="return /[0-9.]/.test(event.key)"></td>
    <td style="text-align:center;">
      <button class="btn-del" onclick="removeRow('row-${rowCount}')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </td>`;
  tbody.appendChild(tr);
  updateTotals();
  renumberRows();
}

function removeRow(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
  updateTotals();
  renumberRows();
}

function renumberRows() {
  const rows = document.getElementById('itemsBody').children;
  for (let i = 0; i < rows.length; i++) {
    rows[i].cells[0].textContent = i + 1;
  }
}

function updateTypeBadge(sel) { /* visual feedback could go here */ }

function updateTotals() {
  const rows = document.getElementById('itemsBody').children;
  let labor = 0, parts = 0;
  for (const row of rows) {
    const sel = row.querySelector('select');
    const priceInput = row.querySelector('.price-input');
    const val = parseFloat(priceInput.value.replace(/,/g,'')) || 0;
    if (sel.value === 'labor') labor += val;
    else parts += val;
  }
  const grand = labor + parts;
  document.getElementById('totalLabor').textContent = '฿' + labor.toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
  document.getElementById('totalParts').textContent = '฿' + parts.toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
  document.getElementById('totalGrand').textContent = '฿' + grand.toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function getVal(id) { return (document.getElementById(id)||{}).value || ''; }

/* ===== COLLECT DATA ===== */
function collectItems() {
  const rows = document.getElementById('itemsBody').children;
  const items = [];
  for (const row of rows) {
    const desc = row.querySelectorAll('input')[0].value || '';
    const type = row.querySelector('select').value;
    const price = parseFloat(row.querySelector('.price-input').value.replace(/,/g,'')) || 0;
    items.push({ desc, type, price });
  }
  return items;
}

/* ===== BUILD PDF HTML ===== */
function buildPDFHTML() {
  const shopName = getVal('shopName') || 'อู่ทำสีรถยนต์';
  const shopAddr = getVal('shopAddress');
  const shopPhone = getVal('shopPhone');
  const shopLineId = getVal('shopLine');
  const custName = getVal('custName') || '-';
  const custPhone = getVal('custPhone') || '-';
  const custLine = getVal('custLine') || '-';
  const carModel = getVal('carModel') || '-';
  const carPlate = getVal('carPlate') || '-';
  const carColor = getVal('carColor') || '-';
  const quoteDate = getVal('quoteDate') || '-';
  const note = getVal('quoteNote');
  const items = collectItems();

  let labor = 0, parts = 0;
  items.forEach(i => { if (i.type === 'labor') labor += i.price; else parts += i.price; });
  const grand = labor + parts;

  const fmt = v => v.toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});

  // Logo HTML
  let logoHTML = '';
  if (logoDataURL) {
    logoHTML = `<img class="pdf-logo" src="${logoDataURL}" alt="logo">`;
  } else {
    logoHTML = `<div class="pdf-logo-text">${shopName.substring(0,8)}</div>`;
  }

  // Items rows
  let itemRows = '';
  items.forEach((item, idx) => {
    const badgeClass = item.type === 'labor' ? 'pdf-badge-labor' : 'pdf-badge-parts';
    const badgeText = item.type === 'labor' ? 'ค่าแรงทำสี' : 'ค่าอะไหล่';
    itemRows += `<tr>
      <td class="c" style="font-size:11px;color:#64748b;">${idx+1}</td>
      <td>${item.desc || '-'}</td>
      <td class="c"><span class="${badgeClass}">${badgeText}</span></td>
      <td class="r">฿${fmt(item.price)}</td>
    </tr>`;
  });
  if (items.length === 0) {
    itemRows = `<tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:20px;font-size:12px;">ไม่มีรายการ</td></tr>`;
  }

  const shopMeta = [
    shopAddr ? shopAddr : null,
    shopPhone ? `โทร: ${shopPhone}` : null,
    shopLineId ? `Line: ${shopLineId}` : null
  ].filter(Boolean).join('<br>');

  const noteBlock = note ? `<div class="pdf-note"><strong>📝 หมายเหตุ:</strong> ${note}</div>` : '';

  const html = `
    <div class="pdf-header">
      <div class="pdf-shop-info">
        ${logoHTML}
        <div>
          <div class="pdf-shop-name">${shopName}</div>
          <div class="pdf-shop-addr">${shopMeta || '&nbsp;'}</div>
        </div>
      </div>
      <div class="pdf-doc-meta">
        <div class="pdf-doc-title">ใบเสนอราคา</div>
        <div class="pdf-doc-no">Quotation</div>
        <div class="pdf-doc-sub">วันที่: ${quoteDate}</div>
      </div>
    </div>

    <div class="pdf-info-row">
      <div class="pdf-info-box">
        <div class="pdf-info-box-title">👤 ข้อมูลลูกค้า</div>
        <div class="pdf-info-grid">
          <div class="pdf-info-item"><span class="pdf-info-key">ชื่อ:</span><span class="pdf-info-val">${custName}</span></div>
          <div class="pdf-info-item"><span class="pdf-info-key">โทร:</span><span class="pdf-info-val">${custPhone}</span></div>
          <div class="pdf-info-item"><span class="pdf-info-key">Line:</span><span class="pdf-info-val">${custLine}</span></div>
        </div>
      </div>
      <div class="pdf-info-box">
        <div class="pdf-info-box-title">🚗 ข้อมูลรถยนต์</div>
        <div class="pdf-info-grid">
          <div class="pdf-info-item" style="grid-column:1/-1"><span class="pdf-info-key">รุ่น:</span><span class="pdf-info-val">${carModel}</span></div>
          <div class="pdf-info-item"><span class="pdf-info-key">ทะเบียน:</span><span class="pdf-info-val">${carPlate}</span></div>
          <div class="pdf-info-item"><span class="pdf-info-key">สีเดิม:</span><span class="pdf-info-val">${carColor}</span></div>
        </div>
      </div>
    </div>

    <table class="pdf-items-table">
      <thead>
        <tr>
          <th class="c" style="width:36px;">#</th>
          <th>รายการ / รายละเอียดงาน</th>
          <th class="c" style="width:110px;">ประเภท</th>
          <th class="r" style="width:110px;">ราคา (บาท)</th>
        </tr>
      </thead>
      <tbody>${itemRows}</tbody>
    </table>

    <div class="pdf-totals-section">
      <div class="pdf-totals-box">
        <div class="pdf-total-row labor">
          <span>💙 รวมค่าแรงทำสี</span><span>฿${fmt(labor)}</span>
        </div>
        <div class="pdf-total-row parts">
          <span>💚 รวมค่าอะไหล่</span><span>฿${fmt(parts)}</span>
        </div>
        <div class="pdf-total-row grand">
          <span>ยอดรวมสุทธิ</span><span>฿${fmt(grand)}</span>
        </div>
      </div>
    </div>

    ${noteBlock}

    <div class="pdf-warranty">
      <strong>🛡️ เงื่อนไขการรับประกันงานสี</strong>
      บริษัทรับประกันคุณภาพงานสีเป็นระยะเวลา <strong>1 ปี</strong> นับจากวันที่รับมอบรถ ครอบคลุมงานสีหลุด แตกลาย หรือซีดจางที่เกิดจากกระบวนการทำสี ไม่รวมถึงความเสียหายที่เกิดจากอุบัติเหตุ การใช้สารเคมี หรือการดัดแปลงหลังรับรถ
    </div>

    <div class="pdf-sigs">
      <div class="pdf-sig-box">
        <div class="pdf-sig-line"></div>
        <div class="pdf-sig-label">ลายมือชื่อผู้เสนอราคา</div>
        <div class="pdf-sig-date">( ${shopName} )</div>
      </div>
      <div class="pdf-sig-box">
        <div class="pdf-sig-line"></div>
        <div class="pdf-sig-label">ลายมือชื่อลูกค้า</div>
        <div class="pdf-sig-date">( ${custName} )</div>
      </div>
      <div class="pdf-sig-box">
        <div class="pdf-sig-line"></div>
        <div class="pdf-sig-label">วันที่รับทราบ</div>
        <div class="pdf-sig-date">_____ / _____ / _____</div>
      </div>
    </div>

    <div class="pdf-footer">
      เอกสารนี้ออกโดย ${shopName} ${shopPhone ? '| โทร ' + shopPhone : ''} ${shopLineId ? '| Line: ' + shopLineId : ''}
    </div>
  `;
  return html;
}

/* ===== GENERATE PDF ===== */
async function generatePDF() {
  const btn = document.querySelector('.btn-print');
  const orig = btn.innerHTML;
  btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> กำลังสร้าง PDF...`;
  btn.disabled = true;

  const page = document.getElementById('pdfPage');
  page.innerHTML = buildPDFHTML();

  await new Promise(r => setTimeout(r, 400));

  try {
    const canvas = await html2canvas(document.getElementById('pdf-doc'), {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      width: 794,
      windowWidth: 794
    });

    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const pdfW = pdf.internal.pageSize.getWidth();
    const pdfH = (canvas.height * pdfW) / canvas.width;
    pdf.addImage(imgData, 'PNG', 0, 0, pdfW, pdfH);

    const custName = getVal('custName') || 'ลูกค้า';
    const carPlate = getVal('carPlate') || 'รถยนต์';
    pdf.save(`ใบเสนอราคา_${custName}_${carPlate}.pdf`);
  } catch(err) {
    // fallback: print
    const w = window.open('', '_blank');
    w.document.write(`<!DOCTYPE html><html><head>
      <meta charset="UTF-8">
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
      <style>
        body { font-family:'IBM Plex Sans Thai',sans-serif; background:white; margin:0; padding:0; }
        ${document.querySelector('style').innerHTML}
      </style></head><body>
      <div style="width:794px;padding:40px 48px;">${buildPDFHTML()}</div>
      <script>window.onload=function(){window.print();window.close();}<\/script>
      </body></html>`);
    w.document.close();
  }

  btn.innerHTML = orig;
  btn.disabled = false;
}

/* ===== INIT ===== */
loadShopData();
addRow('', 'labor', '');
addRow('', 'parts', '');
</script>
</body>
</html>
